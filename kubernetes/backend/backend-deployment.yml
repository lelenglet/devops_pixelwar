---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pixelwar-back-depl
  namespace: pixelwar
spec:
  selector:
    matchLabels:
      app: backend
      track: stable
  replicas: 3
  template:
    metadata:
      labels:
        app: backend
        track: stable
    spec:
      containers:
      - name: backend
        image: app-backend:v1
        imagePullPolicy: IfNotPresent
        env:
          - name: DB_HOST
            value: "postgresdb"
          - name: DB_PORT
            value: "5432"
          - name: DB_NAME
            valueFrom:
              secretKeyRef:
                name: db-credentials
                key: POSTGRES_DB
          - name: DB_USER
            valueFrom:
              secretKeyRef:
                name: db-credentials
                key: POSTGRES_USER
          - name: DB_PASS
            valueFrom:
              secretKeyRef:
                name: db-credentials
                key: POSTGRES_PASSWORD
...