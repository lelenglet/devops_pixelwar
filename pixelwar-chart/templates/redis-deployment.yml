apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-master
  namespace: {{ .Values.namespace | default "default" | quote }}
spec:
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: master
        image: redis:alpine
        ports:
        - containerPort: 6379