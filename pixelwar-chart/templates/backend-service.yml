apiVersion: v1
kind: Service
metadata:
  name: "{{ .Release.Name }}-back-service"
  namespace: {{ .Values.namespace | default "default" | quote }}
  labels:
    app: {{ .Values.backend.labels.app | quote }}
spec:
  type: {{ .Values.backend.service.type }}
  selector:
    app: {{ .Values.backend.labels.app | quote }}
  ports:
  - name: http-metrics
    protocol: TCP
    port: {{ .Values.backend.service.port }}
    targetPort: {{ .Values.backend.service.targetPort }}
    {{- if eq .Values.backend.service.type "NodePort" }}
    nodePort: {{ .Values.backend.service.nodePort | default 30080 }}
    {{- end }}