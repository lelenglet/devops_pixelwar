apiVersion: v1
kind: Service
metadata:
  name: "{{ .Release.Name }}-back-service"
  namespace: {{ .Values.namespace | default "default" | quote }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app: {{ .Values.labels.app | quote }}
  ports:
  - protocol: TCP
    port: {{ .Values.service.port }}
    targetPort: {{ .Values.service.targetPort }}
    {{- if eq .Values.service.type "NodePort" }}
    nodePort: {{ .Values.service.nodePort | default 30000 }}
    {{- end }}