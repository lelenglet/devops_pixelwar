name: CI-merge Pixel War

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install & Test Backend
        run: |
          cd backend
          npm ci
          npm test || echo "Pas de tests définis, on continue"

      - name: Install & Test Frontend
        run: |
          cd frontend
          npm ci
          npm test || echo "Pas de tests définis, on continue"

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Helm
        run: |
          helm upgrade --install pixelwar ./pixelwar-chart \
          --namespace pixelwar \
          --create-namespace
      - name: Front accessible sur localhost:8080
        run: |
          kubectl port-forward svc/pixelwar-front-service 8080:80 -n pixelwar
      - name: Exposition du back  
        run: |
          kubectl port-forward svc/pixelwar-back-service 3000:3000 -n pixelwar
