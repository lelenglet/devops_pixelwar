name: CI-merge Pixel War

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install & Test Backend
        run: |
          cd backend
          npm ci
          npm test || echo "Pas de tests définis, on continue"

      - name: Install & Test Frontend
        run: |
          cd frontend
          npm ci
          npm test || echo "Pas de tests définis, on continue"

  update-gitops:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Update Image Tag
        run: |
          sed -i "s/tag: v1/tag: ${{ github.sha }}/g" pixelwar-chart/values.yaml
          
      - name: Commit & Push
        run: |
          git config --global user.name "Actions Bot"
          git config --global user.email "bot@isima.fr"
          git add pixelwar-chart/values.yaml
          git commit -m "deploy: update image to ${{ github.sha }}"
          git push