name: CI-merge Pixel War

on:
  push:
    branches:
      - ci_cd

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install & Test Backend
        run: |
          cd backend
          npm ci
          npm test || echo "Pas de tests définis, on continue"

      - name: Install & Test Frontend
        run: |
          cd frontend
          npm ci
          npm test || echo "Pas de tests définis, on continue"

  deploy: # On renomme build en deploy, c'est plus juste
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      # ÉTAPE INDISPENSABLE : Connecter GitHub au cluster ISIMA
      - name: Kubernetes Context
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG }} # Ton fichier kubeconfig doit être dans les secrets GitHub

      - name: Deploy with Helm
        run: |
          # On déploie réellement sur le cluster distant
          helm upgrade --install pixelwar ./pixelwar-chart \
          --namespace pixelwar \
          --create-namespace \
          --set frontend.image.tag=latest \
          --set backend.image.tag=latest

      - name: Verify Deployment
        run: |
          kubectl rollout status deployment/pixelwar-frontend -n pixelwar --timeout=60s
          kubectl rollout status deployment/pixelwar-backend -n pixelwar --timeout=60s