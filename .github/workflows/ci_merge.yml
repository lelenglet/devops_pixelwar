name: CI-merge Pixel War

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install & Test Backend
        run: |
          cd backend
          npm ci
          npm test || echo "Pas de tests définis, on continue"

      - name: Install & Test Frontend
        run: |
          cd frontend
          npm ci
          npm test || echo "Pas de tests définis, on continue"

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Docker images creation
        run: |
          cd backend
          docker build -t app-backend:v1 .
          cd ../frontend
          docker build -t app-frontend:v1 .

      - name: Cluster kind creation
        run: |
          kind create cluster --name pixel-war --config kind-config.yaml
      - name: Loading app images
        run: |
          kind load docker-image app-frontend:v1 --name pixel-war
          kind load docker-image app-backend:v1 --name pixel-war
      - name: Manifest deployement
        run: |
          kubectl apply -f kubernetes/namespace.yaml
          kubectl apply -f kubernetes/db/
          kubectl apply -f kubernetes/backend/
          kubectl apply -f kubernetes/frontend/
      - name: Wait for pods
        run: |
          kubectl wait --for=condition=ready pod --all -n pixelwar --timeout=60s
      - name: Manifest display
        run: |
          kubectl get all -n pixelwar
