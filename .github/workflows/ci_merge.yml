name: CI/CD Pixel War - Production

on:
  push:
    branches:
      - argocd
      
env:
  REGISTRY: ghcr.io
  IMAGE_NAME_BACK: ${{ github.repository }}-backend
  IMAGE_NAME_FRONT: ${{ github.repository }}-frontend

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install & Test Backend
        run: |
          cd backend
          npm ci
          npm test || echo "Pas de tests définis, on continue"

      - name: Install & Test Frontend
        run: |
          cd frontend
          npm ci
          npm test || echo "Pas de tests définis, on continue"


  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACK }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACK }}:${{ github.sha }}

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONT }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONT }}:${{ github.sha }}

  update-manifests:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image tags in values.yaml
        run: |
          # Mise à jour précise des tags pour le backend et le frontend
          # Utilise le SHA du commit pour garantir l'unicité et le déploiement ArgoCD
          sed -i "/backend:/,/tag:/ s/tag: .*/tag: \"${{ github.sha }}\"/" pixelwar-chart/values.yaml
          sed -i "/frontend:/,/tag:/ s/tag: .*/tag: \"${{ github.sha }}\"/" pixelwar-chart/values.yaml

      - name: Commit and push changes
        run: |
          git config --global user.name "lelenglet[bot]"
          git config --global user.email "lelenglet[bot]@gmail.com"
          git add pixelwar-chart/values.yaml
          git commit -m "chore: update images tag to ${{ github.sha }} [skip ci]"
          git push
