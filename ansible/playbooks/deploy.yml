---
# Déploiement du chart Helm (équivalent à run.sh sans build Docker / kind load).
# Prérequis : cluster accessible (ex. kind), helm, kubectl, collection kubernetes.core.
# Depuis le dossier ansible/ : ansible-galaxy collection install -r requirements.yml
# Puis : ansible-playbook playbooks/deploy.yml
- name: Déployer Pixel War via Helm
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    repo_root: "{{ playbook_dir | dirname | dirname }}"
    chart_path: "{{ repo_root }}/pixelwar-chart"

  tasks:
    - name: Vérifier que le chart est présent
      ansible.builtin.stat:
        path: "{{ chart_path }}/Chart.yaml"
      register: chart_dir
      failed_when: not chart_dir.stat.exists

    - name: Installer / mettre à jour le release Helm
      kubernetes.core.helm:
        name: "{{ helm_release_name }}"
        chart_ref: "{{ chart_path }}"
        release_namespace: "{{ k8s_namespace }}"
        create_namespace: true
        kubeconfig: "{{ kubeconfig_path }}"
        context: "{{ kube_context }}"
        wait: true
        timeout: 15m
        values_files:
          - "{{ chart_path }}/values.yaml"
